<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAPTA · Painel de Atualizações</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Modo Escuro (Padrão) */
    --bg: #0A0E11;
    --bg-panel: #11171B;
    --bg-elevated: #192227;
    --bg-card: #141B1F;
    --border: #222C31;
    --border-soft: #1A2328;
    --text: #E7EEEF;
    --text-muted: #7E8C92;
    --text-dim: #4A5559;
    
    --cyan: #2BD9C9;
    --green: #3FCB6B;
    --amber: #F2A93C;
    --red: #FF5C5C;
    --grey: #6B7780;
    
    --font-display: 'Space Grotesk', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  /* Variáveis do Modo Claro */
  body.light-mode {
    --bg: #F4F7F8;
    --bg-panel: #FFFFFF;
    --bg-elevated: #E9EDF0;
    --bg-card: #FFFFFF;
    --border: #D1D9DC;
    --border-soft: #E0E6E8;
    --text: #0A0E11;
    --text-muted: #4A5559;
    --text-dim: #7E8C92;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); color:var(--text); font-family:var(--font-display); transition: background 0.3s, color 0.3s;}
  body{
    min-height:100vh;
    background-image:
      radial-gradient(circle at 15% 0%, rgba(43,217,201,0.06), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(63,203,107,0.05), transparent 45%);
  }
  ::selection{ background:var(--cyan); color:#06121A; }

  /* ---------- Barras Superiores ---------- */
  .colorbars{ display:flex; height:4px; width:100%; }
  .colorbars span{ flex:1; }
  .cb1{background:#2BD9C9}.cb2{background:#3FCB6B}.cb3{background:#F2A93C}
  .cb4{background:#FF5C5C}.cb5{background:#6B7780}.cb6{background:#3A8FC9}.cb7{background:#1A2328}

  header{
    padding:34px clamp(18px,4vw,56px) 18px;
    border-bottom:1px solid var(--border);
    position:relative;
  }
  
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .eyebrow{
    font-family:var(--font-mono); font-size:11px; letter-spacing:.18em;
    color:var(--cyan); text-transform:uppercase; display:flex; align-items:center; gap:8px;
  }
  .eyebrow .dot{
    width:7px;height:7px;border-radius:50%;background:var(--green);
    box-shadow:0 0 0 0 rgba(63,203,107,.6);
    animation:pulse 2s infinite;
  }
  
  .theme-toggle {
    background: var(--bg-panel); border: 1px solid var(--border);
    color: var(--text-muted); font-family: var(--font-mono); font-size: 11px;
    padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s;
  }
  .theme-toggle:hover { color: var(--text); border-color: var(--cyan); }

  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(63,203,107,.55);}
    70%{box-shadow:0 0 0 7px rgba(63,203,107,0);}
    100%{box-shadow:0 0 0 0 rgba(63,203,107,0);}
  }
  
  h1{ font-size:clamp(28px,4vw,42px); font-weight:700; letter-spacing:-0.01em; line-height:1.05; }
  h1 span{color:var(--text-muted); font-weight:500;}
  .sub{ font-family:var(--font-mono); color:var(--text-muted); font-size:13px; margin-top:8px; max-width:560px; }

  /* ---------- Estatísticas ---------- */
  .stats{ display:flex; flex-wrap:wrap; gap:10px; margin-top:24px; }
  .tally{
    display:flex; align-items:center; gap:9px; background:var(--bg-panel);
    border:1px solid var(--border); border-radius:8px; padding:9px 14px;
    cursor:pointer; font-family:var(--font-mono); font-size:12.5px;
    color:var(--text-muted); transition:all .15s; user-select:none;
  }
  .tally:hover{ border-color:var(--border-soft); transform:translateY(-1px); }
  .tally.active{ background:var(--bg-elevated); color:var(--text); }
  .tally .light{ width:9px; height:9px; border-radius:50%; flex:none; }
  .tally .num{ color:var(--text); font-weight:600; }
  .tally.active .light{ box-shadow:0 0 8px 1px currentColor; }

  /* ---------- Controles ---------- */
  .controls{
    padding:22px clamp(18px,4vw,56px) 0;
    display:flex; flex-wrap:wrap; gap:14px; align-items:center;
  }
  .search-wrap{
    flex:1 1 250px; position:relative; display:flex; align-items:center;
    background:var(--bg-panel); border:1px solid var(--border);
    border-radius:8px; padding:0 14px; height:44px;
  }
  .search-wrap:focus-within{ border-color:var(--cyan); box-shadow:0 0 0 3px rgba(43,217,201,.12); }
  .search-wrap .chevron{ color:var(--cyan); font-family:var(--font-mono); margin-right:8px; font-size:14px;}
  .search-wrap input{
    flex:1; background:none; border:none; outline:none;
    color:var(--text); font-family:var(--font-mono); font-size:14px;
  }
  .search-wrap input::placeholder{ color:var(--text-dim); }
  .clear-btn{
    background:none; border:none; color:var(--text-dim); cursor:pointer;
    font-family:var(--font-mono); font-size:12px; padding:4px 6px;
  }
  .clear-btn:hover{ color:var(--text-muted); }

  .brand-filter {
    background: var(--bg-panel); border: 1px solid var(--border); color: var(--text-muted);
    font-family: var(--font-mono); font-size: 13px; padding: 0 14px; height: 44px;
    border-radius: 8px; outline: none; cursor: pointer; min-width: 160px;
  }
  .brand-filter:focus { border-color: var(--cyan); }

  .tabs{ display:flex; flex-wrap:wrap; gap:6px; padding: 16px clamp(18px,4vw,56px) 0; }
  .tab{
    font-family:var(--font-mono); font-size:12px; letter-spacing:.02em;
    padding:8px 13px; border-radius:7px; border:1px solid var(--border);
    color:var(--text-muted); background:transparent; cursor:pointer;
    transition:all .15s; white-space:nowrap;
  }
  .tab:hover{ color:var(--text); border-color:var(--border-soft); }
  .tab.active{ background:var(--cyan); color:#06181A; border-color:var(--cyan); font-weight:600; }

  /* ---------- Grid e Cards ---------- */
  main{ padding:26px clamp(18px,4vw,56px) 70px; }
  .count-line{
    font-family:var(--font-mono); font-size:12px; color:var(--text-dim);
    margin-bottom:16px; letter-spacing:.04em;
  }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(270px,1fr)); gap:16px; }
  .card{
    background:var(--bg-card); border:1px solid var(--border); border-radius:12px;
    overflow:hidden; display:flex; flex-direction:column;
    transition:border-color .15s, transform .15s; position:relative;
  }
  .card:hover{ border-color:var(--cyan); transform:translateY(-2px); }
  
  .card-img{
    height:140px; width:100%; background:var(--bg-elevated);
    display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden; border-bottom:1px solid var(--border);
  }
  .card-img img{ width:100%; height:100%; opacity:0; transition:opacity .35s; background-color: white; }
  .card-img img.loaded{ opacity:1; }
  .card-img .icon-fallback{ color:var(--text-dim); width:42px; height:42px; }
  .card-img .scanline{
    position:absolute; inset:0;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 3px);
    pointer-events:none;
  }
  
  .tally-dot{
    position:absolute; top:10px; right:10px; width:10px; height:10px; border-radius:50%;
    box-shadow:0 0 0 3px var(--bg-card); z-index:2;
  }
  .tally-dot.blink{ animation:blink 1.4s infinite; }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:.25;} }

  .card-body{ padding:14px 15px 16px; display:flex; flex-direction:column; gap:9px; flex:1; }
  .card-id{ font-family:var(--font-mono); font-size:16.5px; color:var(--cyan); letter-spacing:.05em; }
  .card-name{ font-size:14.5px; font-weight:600; line-height:1.3; }
  .tags{ display:flex; gap:6px; flex-wrap:wrap; }
  .tag{
    font-family:var(--font-mono); font-size:10px; letter-spacing:.03em;
    color:var(--text-muted); border:1px solid var(--border-soft);
    border-radius:5px; padding:3px 7px;
  }
  .version-row{
    font-family:var(--font-mono); font-size:11.5px; color:var(--text-muted);
    display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  }
  .version-row .v-old{ color:var(--text-dim); }
  .version-row .arrow{ color:var(--text-dim); }
  .version-row .v-new{ color:var(--text); font-weight:600; }
  
  .meta-row{
    display:flex; justify-content:space-between; align-items:center;
    margin-top:auto; padding-top:8px; border-top:1px solid var(--border-soft);
  }
  .status-pill{
    display:flex; align-items:center; gap:6px; font-family:var(--font-mono);
    font-size:10.5px; padding:4px 8px; border-radius:5px; background:var(--bg-elevated);
  }
  .status-pill .light{ width:7px; height:7px; border-radius:50%; flex:none; }
  .date-stamp{ font-family:var(--font-mono); font-size:10.5px; color:var(--text-dim); }
  .obs{ font-size:11.5px; color:var(--text-muted); line-height:1.4; padding:6px 8px; background: var(--bg-elevated); border-radius:4px; margin-top:4px;}

  .empty-state{ grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--text-dim); font-family:var(--font-mono); }
  .empty-state .big{ font-size:34px; margin-bottom:10px; color:var(--text-dim); }

  footer{
    border-top:1px solid var(--border); padding:18px clamp(18px,4vw,56px);
    font-family:var(--font-mono); font-size:11px; color:var(--text-dim);
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
  }
</style>
</head>
<body>

<div class="colorbars">
  <span class="cb1"></span><span class="cb2"></span><span class="cb3"></span><span class="cb4"></span><span class="cb5"></span><span class="cb6"></span><span class="cb7"></span>
</div>

<header>
  <div class="header-top">
    <div class="eyebrow"><span class="dot"></span> CONTROLE DE FIRMWARE &amp; SOFTWARE — 2026</div>
    <button id="themeToggle" class="theme-toggle">☀️ Modo Claro</button>
  </div>
  <h1>KAPTA <span>· Painel de Atualizações</span></h1>
  <div class="sub">Inventário de equipamentos de transmissão: versões, status e histórico de atualização em um único lugar.</div>

  <div class="stats" id="statsRow"></div>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="chevron">›</span>
    <input id="searchInput" type="text" placeholder="Buscar por equipamento, ID ou observação...">
    <button class="clear-btn" id="clearBtn" style="display:none;">limpar ✕</button>
  </div>
  <select id="brandFilter" class="brand-filter">
    <option value="Todas">Todas as Marcas</option>
  </select>
</div>

<div class="tabs" id="tabsRow"></div>

<main>
  <div class="count-line" id="countLine"></div>
  <div class="grid" id="grid"></div>
</main>

<footer>
  <span>KAPTA · Painel dinâmico</span>
  <span>Imagens via Wikipedia API</span>
</footer>

<script>
/* ===================== CONFIGURAÇÕES E ESTILOS ===================== */
const STATUS_COLOR = {
  'Atualizado': 'var(--green)',
  'Checar atualizações': 'var(--amber)',
  'Desatualizado': 'var(--red)',
  'Sem suporte para novas atualizações': 'var(--grey)'
};
const STATUS_PRIORITY = { 'Checar atualizações': 0, 'Desatualizado': 1, 'Sem suporte para novas atualizações': 2, 'Atualizado': 3 };

const CATEGORY_ICONS = {
  'Câmeras': `<svg viewBox="0 0 48 48" fill="none" class="icon-fallback"><rect x="6" y="14" width="28" height="20" rx="3" stroke="currentColor" stroke-width="2"/><path d="M34 20l8-5v18l-8-5" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><circle cx="20" cy="24" r="5" stroke="currentColor" stroke-width="2"/></svg>`,
  'Switchers': `<svg viewBox="0 0 48 48" fill="none" class="icon-fallback"><rect x="6" y="10" width="36" height="28" rx="2" stroke="currentColor" stroke-width="2"/><path d="M14 32V20M24 32V14M34 32V24" stroke="currentColor" stroke-width="2"/><circle cx="14" cy="18" r="2" fill="currentColor"/><circle cx="24" cy="12" r="2" fill="currentColor"/><circle cx="34" cy="22" r="2" fill="currentColor"/></svg>`,
  'Vmix': `<svg viewBox="0 0 48 48" fill="none" class="icon-fallback"><rect x="12" y="6" width="24" height="36" rx="2" stroke="currentColor" stroke-width="2"/><path d="M17 14h14M17 21h14M17 28h6" stroke="currentColor" stroke-width="2"/><circle cx="30" cy="34" r="1.6" fill="currentColor"/></svg>`,
  'Notebooks': `<svg viewBox="0 0 48 48" fill="none" class="icon-fallback"><rect x="10" y="10" width="28" height="18" rx="2" stroke="currentColor" stroke-width="2"/><path d="M6 34h36l-3 4H9l-3-4Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>`,
  'VideoLinks': `<svg viewBox="0 0 48 48" fill="none" class="icon-fallback"><path d="M10 24h8m12 0h8M22 24a4 4 0 1 0 4 0" stroke="currentColor" stroke-width="2"/><path d="M14 14l6 6M34 14l-6 6M14 34l6-6M34 34l-6-6" stroke="currentColor" stroke-width="2"/></svg>`,
  'Comunicação': `<svg viewBox="0 0 48 48" fill="none" class="icon-fallback"><path d="M24 6a16 16 0 0 0-16 16v10a4 4 0 0 0 4 4h2v-14h-2v-0a12 12 0 0 1 24 0v0h-2v14h2a4 4 0 0 0 4-4V22A16 16 0 0 0 24 6Z" stroke="currentColor" stroke-width="2"/></svg>`,
  'Acessórios': `<svg viewBox="0 0 48 48" fill="none" class="icon-fallback"><rect x="16" y="10" width="16" height="28" rx="4" stroke="currentColor" stroke-width="2"/><path d="M24 16v16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`
};

/* ===================== DADOS ESTÁTICOS DE DEMONSTRAÇÃO ===================== */
// Nota: Deixei uma pequena amostra para o layout não quebrar. A conexão com Apps Script substituirá isto.
let ITEMS = [];

/* ===================== APPS SCRIPT (CONEXÃO FUTURA) ===================== */

async function fetchSheetData() {
  try {
    const url = "https://script.google.com/macros/s/AKfycbzvbpQ6ZbZAlWX_JoNBMlxE-Vuaasdyrx30gkX4bFLeSDgFvz80g6YkwmC8T2Zkkjfj0g/exec";
    const res = await fetch(url);
    const data = await res.json();
    
    ITEMS = data.map((row, index) => {
      // 1. Cria um "tradutor" que remove espaços extras e transforma tudo em minúsculo
      const safeRow = {};
      for (let key in row) {
        safeRow[key.trim().toLowerCase()] = row[key];
      }

      // 2. Busca os dados pelas chaves higienizadas e prevê pequenas variações
      return {
        uid: index,
        id: safeRow["id do item"] || safeRow["id"] || "",
        nome: safeRow["nome do item"] || safeRow["nome"] || "Item não identificado",
        marca: safeRow["marca"] || "",
        versaoAnterior: safeRow["versão anterior"] || safeRow["versao anterior"] || "—",
        versaoAtual: safeRow["versão atual"] || safeRow["versao atual"] || "—",
        status: safeRow["status"] || "Desconhecido",
        ultimaAlteracao: safeRow["ultima alteração"] || safeRow["última alteração"] || "—",
        observacoes: safeRow["observações"] || safeRow["observacoes"] || "",
        link: safeRow["link"] || "",
        categoria: safeRow["categoria"] || "Outros",
        imagem: safeRow["imagem"] || safeRow["url da imagem"] || ""
      };
    });
    
    renderAll();
  } catch (error) {
    console.error("Erro ao carregar planilha:", error);
  }
}

/* ===================== ESTADOS ===================== */
let activeStatusFilter = null;
let activeCategory = 'Todas';
let activeBrand = 'Todas';
let searchTerm = '';

/* ===================== DARK/LIGHT MODE ===================== */
const themeToggle = document.getElementById('themeToggle');
if(localStorage.getItem('kapta_theme') === 'light') {
  document.body.classList.add('light-mode');
  themeToggle.textContent = '🌙 Modo Escuro';
}
themeToggle.addEventListener('click', () => {
  document.body.classList.toggle('light-mode');
  const isLight = document.body.classList.contains('light-mode');
  themeToggle.textContent = isLight ? '🌙 Modo Escuro' : '☀️ Modo Claro';
  localStorage.setItem('kapta_theme', isLight ? 'light' : 'dark');
});

/* ===================== RENDERIZAÇÃO DE UI ===================== */
function renderStats(){
  const counts = {};
  ITEMS.forEach(i => counts[i.status] = (counts[i.status]||0) + 1);
  const order = ['Checar atualizações','Atualizado','Desatualizado','Sem suporte para novas atualizações'];
  const row = document.getElementById('statsRow');
  row.innerHTML = '';
  
  const totalChip = document.createElement('div');
  totalChip.className = 'tally' + (activeStatusFilter===null ? ' active' : '');
  totalChip.innerHTML = `<span class="light" style="background:var(--cyan)"></span> TODOS <span class="num">${ITEMS.length}</span>`;
  totalChip.onclick = () => { activeStatusFilter = null; renderGrid(); renderStats(); };
  row.appendChild(totalChip);

  order.forEach(st => {
    if(!counts[st]) return;
    const chip = document.createElement('div');
    chip.className = 'tally' + (activeStatusFilter===st ? ' active' : '');
    chip.style.color = activeStatusFilter===st ? STATUS_COLOR[st] : '';
    chip.innerHTML = `<span class="light" style="background:${STATUS_COLOR[st]}"></span> ${st.toUpperCase()} <span class="num">${counts[st]}</span>`;
    chip.onclick = () => { activeStatusFilter = (activeStatusFilter===st ? null : st); renderGrid(); renderStats(); };
    row.appendChild(chip);
  });
}

function renderTabs(){
  const cats = ['Todas', ...new Set(ITEMS.map(i=>i.categoria).filter(Boolean))];
  const row = document.getElementById('tabsRow');
  row.innerHTML = '';
  cats.forEach(cat => {
    const count = cat==='Todas' ? ITEMS.length : ITEMS.filter(i=>i.categoria===cat).length;
    const btn = document.createElement('button');
    btn.className = 'tab' + (activeCategory===cat ? ' active' : '');
    btn.textContent = `${cat} (${count})`;
    btn.onclick = () => { activeCategory = cat; renderTabs(); renderGrid(); };
    row.appendChild(btn);
  });
}

function populateBrandFilter(){
  const brands = [...new Set(ITEMS.map(i=>i.marca).filter(Boolean))].sort();
  const select = document.getElementById('brandFilter');
  select.innerHTML = '<option value="Todas">Todas as Marcas</option>';
  brands.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b; opt.textContent = b;
    select.appendChild(opt);
  });
}

/* ===================== FILTRO & BUSCA ===================== */
function getFiltered(){
  let list = ITEMS.slice();
  if(activeCategory !== 'Todas') list = list.filter(i => i.categoria === activeCategory);
  if(activeBrand !== 'Todas') list = list.filter(i => i.marca === activeBrand);
  if(activeStatusFilter) list = list.filter(i => i.status === activeStatusFilter);
  if(searchTerm){
    const t = searchTerm.toLowerCase();
    list = list.filter(i =>
      (i.nome && i.nome.toLowerCase().includes(t)) ||
      (i.id && i.id.toLowerCase().includes(t)) ||
      (i.observacoes && i.observacoes.toLowerCase().includes(t))
    );
  }
  list.sort((a,b) => (STATUS_PRIORITY[a.status]??9) - (STATUS_PRIORITY[b.status]??9) || (a.nome||"").localeCompare(b.nome||""));
  return list;
}

/* ===================== BUSCA DE IMAGENS (WIKIPEDIA API - Otimizada) ===================== */
/* ===================== BUSCA DE IMAGENS (Planilha) ===================== */
// 1. Recriamos o observador (Lazy Load) para evitar que o site trave
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      const el = entry.target;
      observer.unobserve(el);
      loadCardImage(el);
    }
  });
}, { rootMargin: '150px' });

// 2. A função que puxa a imagem da planilha
function loadCardImage(container){
  const itemUid = parseInt(container.dataset.uid);
  const item = ITEMS.find(i => i.uid === itemUid);
  
  // Se não encontrar o item ou se a coluna imagem estiver vazia, ele mantém o ícone SVG
  if(!item || !item.imagem) return; 

  const img = document.createElement('img');
  img.src = item.imagem;
  img.onload = () => img.classList.add('loaded');
  // Se o link da imagem estiver quebrado, ele não faz nada e deixa o ícone aparecendo
  img.onerror = () => { console.log("Sem imagem válida para: " + item.nome); }; 
  
  container.appendChild(img);
}
/* ===================== RENDERIZAR GRID ===================== */
function renderGrid(){
  const grid = document.getElementById('grid');
  const list = getFiltered();
  
  let countText = `MOSTRANDO ${list.length} DE ${ITEMS.length} ITENS`;
  if(activeCategory!=='Todas') countText += ` · ${activeCategory.toUpperCase()}`;
  if(activeBrand!=='Todas') countText += ` · MARCA: ${activeBrand.toUpperCase()}`;
  if(activeStatusFilter) countText += ` · ${activeStatusFilter.toUpperCase()}`;
  document.getElementById('countLine').textContent = countText;

  grid.innerHTML = '';

  if(list.length === 0){
    grid.innerHTML = `<div class="empty-state"><div class="big">∅</div>Nenhum item encontrado.<br>Revise seus filtros ou a busca.</div>`;
    return;
  }

  list.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    const color = STATUS_COLOR[item.status] || 'var(--grey)';
    const blink = item.status === 'Checar atualizações' ? ' blink' : '';

    const imgWrap = document.createElement('div');
    imgWrap.className = 'card-img';
    imgWrap.dataset.uid = item.uid; // Referência direta ao item
    
    // Ícone de fallback baseado na categoria
    const icon = CATEGORY_ICONS[item.categoria] || `<svg viewBox="0 0 48 48" fill="none" class="icon-fallback"><rect x="12" y="12" width="24" height="24" rx="2" stroke="currentColor" stroke-width="2"/></svg>`;
    imgWrap.innerHTML = `${icon}<div class="scanline"></div>`;
    card.appendChild(imgWrap);

    const dot = document.createElement('div');
    dot.className = 'tally-dot' + blink;
    dot.style.background = color;
    card.appendChild(dot);

    const body = document.createElement('div');
    body.className = 'card-body';
    
    // Fallback caso não haja nome e identificador
    let showName = item.nome || "Item sem nome";
    let tags = `<span class="tag">${escapeHtml(item.categoria)}</span>`;
    if(item.marca) tags += `<span class="tag">${escapeHtml(item.marca)}</span>`;

    body.innerHTML = `
      <div class="card-id">${escapeHtml(item.id || 'N/A')}</div>
      <div class="card-name">${escapeHtml(showName)}</div>
      <div class="tags">${tags}</div>
      <div class="version-row">
        <span class="v-old">${escapeHtml(item.versaoAnterior || '—')}</span>
        <span class="arrow">→</span>
        <span class="v-new">${escapeHtml(item.versaoAtual || '—')}</span>
      </div>
      ${item.observacoes ? `<div class="obs">${escapeHtml(item.observacoes)}</div>` : ''}
      <div class="meta-row">
        <span class="status-pill"><span class="light" style="background:${color}"></span>${escapeHtml(item.status)}</span>
        <span class="date-stamp">${item.ultimaAlteracao ? escapeHtml(item.ultimaAlteracao) : '—'}</span>
      </div>
    `;
    card.appendChild(body);
    grid.appendChild(card);
    
    // Apenas tenta buscar imagem se o item tiver nome
    if(item.nome) observer.observe(imgWrap);
  });
}

function escapeHtml(str){ return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ===================== LISTENERS ===================== */
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchTerm = e.target.value.trim();
  document.getElementById('clearBtn').style.display = searchTerm ? 'block' : 'none';
  renderGrid();
});
document.getElementById('clearBtn').addEventListener('click', () => {
  searchTerm = ''; document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none'; renderGrid();
});
document.getElementById('brandFilter').addEventListener('change', (e) => {
  activeBrand = e.target.value; renderGrid();
});

function renderAll(){
  populateBrandFilter();
  renderStats();
  renderTabs();
  renderGrid();
}

// Inicializa a aplicação
fetchSheetData(); //<- Descomente esta linha após configurar o Apps Script
renderAll(); 
</script>
